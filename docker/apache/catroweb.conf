<VirtualHost *:80>
        ServerName catroweb
        ServerAlias share.catrob.at
        DocumentRoot /var/www/catroweb/public

        <Directory /var/www/catroweb/public>
             RewriteEngine On

             # Redirect images to webp-on-demand.php (if browser supports webp)
             RewriteCond %{HTTP_ACCEPT} image/webp
             RewriteCond %{REQUEST_FILENAME} -f
             RewriteRule ^(.*)\.(jpe?g|png)$ /webp-on-demand.php?source=%{SCRIPT_FILENAME} [NC,L]
             AddType image/webp .webp

             # Default Symfony routing
             DirectoryIndex /index.php
             FallbackResource /index.php
        </Directory>

        SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

        # Compression
        <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/plain text/css text/javascript application/javascript application/json image/svg+xml application/xml
        </IfModule>

        # Browser caching for static assets
        <IfModule mod_headers.c>
            <FilesMatch "\.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$">
                Header set Cache-Control "max-age=2592000, public"
            </FilesMatch>
            <FilesMatch "\.(css|js)$">
                Header set Cache-Control "max-age=31536000, public, immutable"
            </FilesMatch>
        </IfModule>

        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
