<VirtualHost *:80>
        ServerName catroweb
        ServerAlias share.catrob.at
        DocumentRoot /var/www/catroweb/public

        <Directory /var/www/catroweb/public>
             RewriteEngine On

             # Redirect images to webp-on-demand.php (if browser supports webp)
             RewriteCond %{HTTP_ACCEPT} image/webp
             RewriteCond %{REQUEST_FILENAME} -f
             RewriteRule ^(.*)\.(jpe?g|png)$ /webp-on-demand.php?source=%{SCRIPT_FILENAME} [NC,L]
             AddType image/webp .webp

             # Default Symfony routing
             DirectoryIndex /index.php
             FallbackResource /index.php
        </Directory>

        SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

        # Compression
        <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/plain text/css text/javascript application/javascript application/json image/svg+xml application/xml
        </IfModule>

        # Browser caching for static assets
        <IfModule mod_headers.c>
            <FilesMatch "\.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$">
                Header set Cache-Control "max-age=2592000, public"
            </FilesMatch>
            <FilesMatch "\.(css|js)$">
                Header set Cache-Control "max-age=31536000, public, immutable"
            </FilesMatch>
        </IfModule>

        # Security headers
        <IfModule mod_headers.c>
            Header always set X-Content-Type-Options "nosniff"
            Header always set X-Frame-Options "SAMEORIGIN"
            Header always set Referrer-Policy "strict-origin-when-cross-origin"
            Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"

            # HSTS: only sent over HTTPS connections (env=HTTPS)
            Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains" env=HTTPS

            # Content-Security-Policy in report-only mode for auditing (not enforcing)
            Header always set Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https: blob:; font-src 'self' https: data:; connect-src 'self' https:; frame-src 'self' https:; media-src 'self' blob:;"
        </IfModule>

        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
