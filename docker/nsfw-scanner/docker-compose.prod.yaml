services:
  nsfw-scanner:
    container_name: nsfw-scanner
    build: .
    image: nsfw-scanner:latest
    ports:
      - '127.0.0.1:5000:5000'
    restart: always
    mem_limit: 4g
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
