  ################################################
  # Media Library
  #
  '/media/library':
    parameters:
      - $ref: '#/components/parameters/Locale'

    get:
      tags:
        - 'Media Library'
      summary: 'Get media library overview with categories and preview assets'
      description: 'Returns all categories with a preview of assets per category. Uses cursor-based pagination.'
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: file_type
          in: query
          required: false
          description: 'Filter categories and assets by file type'
          schema:
            type: string
            enum:
              - IMAGE
              - SOUND
        - name: flavor
          in: query
          required: false
          schema:
            type: string
          description: 'Filter assets by flavor name'
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: 'Search query for assets and categories'
        - name: assets_per_category
          in: query
          required: false
          schema:
            type: integer
            default: 5
            minimum: 1
            maximum: 20
          description: 'Number of preview assets to return per category'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaLibraryResponse'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
        '400':
          $ref: '#/components/responses/BadRequest'
        '406':
          $ref: '#/components/responses/NotAcceptable'

  '/media/categories':
    parameters:
      - $ref: '#/components/parameters/Locale'

    get:
