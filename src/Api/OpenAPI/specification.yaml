components:
  ##############################################
  # Default Response messages
  ###
  responses:
    OK:
      description: 'OK'

    NoContent:
      description: 'No Content'

    UnauthorizedError:
      description: 'Invalid JWT token | JWT token not found | JWT token expired'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    BadRequest:
      description: 'Bad request (Invalid, or missing parameters)'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InvalidCredentials:
      description: 'Invalid credentials'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InvalidRefreshToken:
      description: 'Refresh Token expired | Refresh Token has been used more than once (single use)'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InvalidUploadToken:
      description: 'The provided deprecated upload token is invalid or has expired'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotAcceptable:
      description: 'Not acceptable - client must accept application/json as content type'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    UnsupportedMediaType:
      description: 'Unsupported Media Type - request must use application/json as content type'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: 'Not found'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    UnprocessableEntity:
      description: 'Unprocessable Entity'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InvalidIdToken:
      description: 'Invalid Client ID token'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: 'Insufficient privileges, action not allowed.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    TooManyRequests:
      description: 'Too Many Requests'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  ##############################################
  # Security Schemes
  ###
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  ##############################################
  # Request Parameters
  ###
  parameters:
    ##
    # Default
    #
    Locale:
      in: header
      name: Accept-Language
      required: false
      schema:
        type: string
        description: 'ISO 639-1 or ISO 3166-1 locale of the user. Defaults internally to en'
        default: 'en'

    Uuid:
      name: id
      in: path
      schema:
        $ref: '#/components/schemas/Uuid'
      required: true

    Flavor:
      in: query
      name: flavor
      schema:
        type: string
        example: 'luna'
        default: ''

    Platform:
      in: query
      name: platform
      required: false
      description: 'Indication for which platform the response should be optimized (ios, android)'
      schema:
        type: string
        example: 'ios'
        default: ''
        enum:
          - ''
          - 'android'
          - 'ios'

    Limit:
      name: limit
      in: query
      schema:
        $ref: '#/components/schemas/Limit'

    Cursor:
      name: cursor
      in: query
      required: false
      description: 'Cursor for pagination (opaque string from the previous response)'
      schema:
        type: string

    Attributes:
      name: attributes
      in: query
      schema:
        type: string
        description: 'Comma-separated list of attributes to include in the response'
        pattern: '^[a-zA-Z0-9\-_]+(,[a-zA-Z0-9\-_]+)*$'
        example: 'id,name,description'
        default: ''

    RefreshToken:
      name: X-Refresh
      in: header
      description: 'Refresh Token'
      schema:
        type: string
        example: 'xxxxx.yyyyy.zzzzz'
      required: true

    ##
    # Notifications specific
    #
    NotificationId:
      name: id
      in: path
      schema:
        $ref: '#/components/schemas/Uuid'
      required: true

    CommentId:
      name: id
      in: path
      schema:
        $ref: '#/components/schemas/Uuid'
      required: true

    NotificationsType:
      name: type
      in: query
      schema:
        type: string
        enum:
          - 'all'
          - 'reaction'
          - 'follow'
          - 'comment'
          - 'remix'
          - 'studio'
          - 'project'
        default: 'all'

    ##
    # Project specific
    #
    ProjectType:
      in: query
      name: category
      required: false
      description: 'Project category. When omitted, defaults to recent projects.'
      schema:
        type: string
        enum:
          - 'recent'
          - 'random'
          - 'most_viewed'
          - 'most_downloaded'
          - 'example'
          - 'scratch'
          - 'recommended'
          - 'trending'
          - 'popular'

    RecommendedProjectType:
      in: query
      name: category
      required: true
      schema:
        type: string
        enum:
          - 'similar'
          - 'also_downloaded'
          - 'more_from_user'
      description: "
        * `similar` - Get similar projects to the specific project\n
        * `also_downloaded` - Get projects that users who downloaded the specific project also downloaded\n
        * `more_from_user` - Get more projects from the owner of the specific project
        "
    MaxVersion:
      name: max_version
      in: query
      schema:
        type: string
        example: '0.999'
        default: ''
      description: "
        Only shows project with a smaller version number than max version.\n
        `Warning!` Current implementation is kinda broken.
        To ensure correct results use the following format '[0-9].[0-9]{3}'
        "

    ##
    # Search specific
    #
    SearchType:
      name: type
      in: query
      schema:
        type: string
        default: all
        enum:
          - 'all'
          - 'projects'
          - 'users'
          - 'studios'

  ##############################################
  # Response Headers
  ###

  headers:
    X-Response-Hash:
      schema:
        type: string
        example: '56asfd5a56sfd564a56dsf65a56sdf'
      description: 'MD5 Hash of response the body. Used for caching responses.'

    Content-Language:
      schema:
        type: string
        example: 'de_DE'
      description: 'Locale of the response content. Default: `en`'

  schemas:
    ##############################################
    # Moderation Schemas
    ###

    ReportReceiptResponse:
      type: object
      required:
        - report_id
      properties:
        report_id:
          type: string
          format: uuid
          description: 'The unique identifier of the created report'

    ##############################################
    # Shared Image Schemas
    ###

    ImageVariantSet:
      type: object
      description: |
        A set of URLs for one logical image width (e.g. thumb/card/detail) in
        modern formats and device-pixel ratios. Clients should prefer AVIF
        and fall back to WebP. URLs are nullable when a given format is not
        available (e.g. AVIF when the encoder is missing).
      properties:
        avif_1x:
          type: string
          format: uri
          nullable: true
          description: 'AVIF encoded at 1x device-pixel ratio'
          example: 'https://share.catrob.at/resources/images/users/abc-thumb@1x.avif'
        avif_2x:
          type: string
          format: uri
          nullable: true
          description: 'AVIF encoded at 2x device-pixel ratio (retina)'
        webp_1x:
          type: string
          format: uri
          nullable: true
          description: 'WebP encoded at 1x device-pixel ratio'
        webp_2x:
          type: string
          format: uri
          nullable: true
          description: 'WebP encoded at 2x device-pixel ratio (retina)'

    ImageVariants:
      type: object
      description: |
        Responsive image variants shared by studio covers, user avatars and
        project screenshots. Each property is an {@see ImageVariantSet}
        intended for a specific render context:
          * `thumb`   ~ 96 CSS px  (comment/list avatars, small cards)
          * `card`    ~ 320 CSS px (project tiles, search cards, profile hero)
          * `detail`  ~ 960 CSS px (project detail, studio header, featured banner)
        Build a `<picture>` with `<source type="image/avif">` then
        `<source type="image/webp">` and a final `<img>` fallback to the WebP
        1x URL, using `srcset` `"url 1x, url2 2x"` per set.
      properties:
        thumb:
          $ref: '#/components/schemas/ImageVariantSet'
        card:
          $ref: '#/components/schemas/ImageVariantSet'
        detail:
          $ref: '#/components/schemas/ImageVariantSet'
        width:
          type: integer
          nullable: true
          description: 'Original image width in pixels (useful as a CLS-safe layout hint)'
          example: 1920
        height:
          type: integer
          nullable: true
          description: 'Original image height in pixels (useful as a CLS-safe layout hint)'
          example: 1080

    ##############################################
    # Default Schemas
    ###

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          description: 'Overall health status'
          enum:
            - 'ok'
            - 'degraded'
          example: 'ok'
        timestamp:
          type: string
          format: date-time
          description: 'Current server time in ISO 8601 format'
          example: '2026-03-28T12:00:00+00:00'
        database:
          type: string
          description: 'Database connectivity status'
          enum:
            - 'ok'
            - 'error'
          example: 'ok'

    Uuid:
      type: string
      description: 'Unique UUID/ID (string) of the object'
      pattern: '^[a-zA-Z0-9\-]+$'
      example: '1234abcd-12ab-12ab-12ab-123456abcdef'

    Limit:
      type: integer
      minimum: 0
      description: 'How many objects should be shown at maximum'
      default: 20
      example: 3

    ##############################################
    # Media Library Schemas
    ###

    # Library Overview Response
    MediaLibraryResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MediaLibraryCategoryPreview'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    MediaLibraryCategoryPreview:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174000'
        name:
          type: string
          example: 'Figures'
          description: 'Category name'
        description:
          type: string
          example: 'Character figures for your projects'
          description: 'Category description'
        priority:
          type: integer
          example: 1
        assets_count:
          type: integer
          example: 42
          description: 'Total number of assets in this category'
        preview_assets:
          type: array
          description: 'Preview of assets in this category'
          items:
            $ref: '#/components/schemas/MediaAssetResponse'

    # Category Responses
    MediaCategoriesListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MediaCategoryResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    MediaCategoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174000'
        name:
          type: string
          example: 'Figures'
          description: 'Category name'
        description:
          type: string
          example: 'Character figures for your projects'
          description: 'Category description'
        priority:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MediaCategoryDetailResponse:
      allOf:
        - $ref: '#/components/schemas/MediaCategoryResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/MediaAssetResponse'
            next_cursor:
              type: string
              nullable: true
            has_more:
              type: boolean

    # Category Requests
    MediaCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: 'Figures'
          description: 'Category name'
        description:
          type: string
          example: 'Character figures for your projects'
          description: 'Category description'
        priority:
          type: integer
          example: 1
          default: 0

    # Asset Responses
    MediaAssetsListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MediaAssetResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    MediaAssetResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174000'
        name:
          type: string
          example: 'Penguin'
        description:
          type: string
          example: 'A cute penguin character'
        file_type:
          type: string
          enum:
            - IMAGE
            - SOUND
          example: IMAGE
        extension:
          type: string
          example: 'png'
        size:
          type: integer
          description: 'File size in bytes'
          example: 524288
        author:
          type: string
          example: 'Catrobat'
        downloads:
          type: integer
          example: 42
        active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        category_id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174000'
          description: 'Category UUID'
        category_name:
          type: string
          example: 'Figures'
          description: 'Translated category name'
        flavors:
          type: array
          items:
            type: string
          example: ['pocketcode', 'luna']
        download_url:
          type: string
          example: 'https://share.catrob.at/api/media/123e4567-e89b-12d3-a456-426614174000.png'
        thumbnail:
          $ref: '#/components/schemas/ImageVariants'

    # Asset Requests
    MediaAssetUploadRequest:
      type: object
      required:
        - file
        - name
        - category_id
        - flavors
      properties:
        file:
          type: string
          format: binary
          description: 'The media file to upload (max 10MB)'
        name:
          type: string
          example: 'Penguin'
        description:
          type: string
          example: 'A cute penguin character'
        category_id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174000'
        flavors:
          type: array
          items:
            type: string
          example: ['pocketcode', 'luna']
          description: 'Array of flavor names'
        author:
          type: string
          example: 'Catrobat'

    MediaAssetUpdateRequest:
      type: object
      properties:
        name:
          type: string
          example: 'Penguin Updated'
        description:
          type: string
          example: 'An even cuter penguin'
        category_id:
          type: string
          format: uuid
        flavors:
          type: array
          items:
            type: string
        author:
          type: string
        active:
          type: boolean

    ##############################################
    # Authentication Schemas
    ###

    ## Request

    LoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 180
          example: 'Catrobat'
          description: 'Name of the user'
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 4096
          example: 'myPassword123'
          description: 'A secure password'
    OAuthLoginRequest:
      type: object
      properties:
        id_token:
          type: string
          example: '.eydfdf23232323'
          description: 'User ID token'
        resource_owner:
          type: string
          example: 'google'
          description: 'OAuth provider'
    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
          example: 'xxxxx.yyyyy.zzzzz'

    ## Response

    JWTResponse:
      type: object
      properties:
        token:
          type: string
          example: 'xxxxx.yyyyy.zzzzz'
        refresh_token:
          type: string
          example: 'xxxxx.yyyyy.zzzzz'

    ##############################################
    # UserSchemas
    ###

    ## Request

    BaseUser:
      type: object
      properties:
        email:
          type: string
          format: email
          example: 'foo.bar@catrob.at'
          description: 'Email of the user'
        username:
          type: string
          example: Testuser
          # no min/max specification in order to handle the errors in catroweb instead of the autogenerated controllers.
          description: 'Name of the user | minLength: 3 | maxLength: 180'
        password:
          type: string
          format: password
          example: password
          # no min/max specification in order to handle the errors in catroweb instead of the autogenerated controllers.
          description: 'A secure password | minLength: 6 | maxLength: 4096'
        picture:
          type: string
          example: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQ…'
          description: 'The profile picture of the user in data URI scheme.'
        about:
          type: string
          example: 'My name is Irving and I love developing games with Pocket Code!'
          description: 'An introduction of the user.'
        currently_working_on:
          type: string
          example: 'The next awesome game!'
          description: 'A short description about the project the user is currently working on.'

    ResetPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: 'foo.bar@catrob.at'
          description: 'Email of the user'
        captcha_token:
          type: string
          description: 'CAPTCHA response token for bot detection'

    RegisterRequest:
      allOf:
        - $ref: '#/components/schemas/DryRun'
        - $ref: '#/components/schemas/BaseUser'
        - type: object
          properties:
            captcha_token:
              type: string
              description: 'CAPTCHA response token for bot detection'
            date_of_birth:
              type: string
              example: '2000-01-15'
              description: 'Date of birth for age verification (COPPA compliance). Format: YYYY-MM-DD'
            parent_email:
              type: string
              example: 'parent@example.com'
              description: 'Email address of parent/guardian. Required for users under 13 for parental consent.'

    UpdateUserRequest:
      allOf:
        - $ref: '#/components/schemas/DryRun'
        - $ref: '#/components/schemas/BaseUser'
        - type: object
          properties:
            current_password:
              type: string
              format: password
              example: current password
              description: 'The current password of the user. Required for changing the password.'

    DryRun:
      type: object
      properties:
        dry_run:
          type: boolean
          default: false
          description: 'Indicates if a request should only be verified or executed'

    ## Response

    UsersListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BasicUserDataResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    BasicUserDataResponse:
      type: object
      properties:
        id:
          type: string
          example: '1234abcd-12ab-12ab-12ab-123456abcdef'
          description: 'Unique ID of the user'
        username:
          type: string
          example: 'Catroweb'
          description: 'Nickname of the user'
        avatar:
          $ref: '#/components/schemas/ImageVariants'
        about:
          type: string
          example: 'My name is Irving and I love developing games with Pocket Code!'
          description: 'An introduction of the user.'
        currently_working_on:
          type: string
          example: 'The next awesome game!'
          description: 'A short description about the project the user is currently working on.'
        projects:
          type: integer
          example: 4
          description: 'Amount of projects of the user'
        followers:
          type: integer
          example: 11
          description: 'Amount of users that follow this user'
        following:
          type: integer
          example: 42
          description: 'Amount of users followed by this user'
        ranking_score:
          type: integer
          example: 151
          description: 'Ranking score of this user'
        is_verified:
          type: boolean
          example: true
          description: 'Whether the user account is verified (only populated for GET /users/{id})'
        scratch_username:
          type: string
          nullable: true
          example: null
          description: 'The Scratch username if the user was imported from Scratch; null otherwise (only populated for GET /users/{id})'
        is_followed_by_viewer:
          type: boolean
          nullable: true
          example: null
          description: 'Whether the authenticated viewer follows this user; null when unauthenticated (only populated for GET /users/{id})'

    ExtendedUserDataResponse:
      allOf:
        - $ref: '#/components/schemas/BasicUserDataResponse'
        - type: object
          # all private properties
          properties:
            email:
              type: string
              format: email
              example: 'foo.bar@catrob.at'
              description: 'EMail of the user'

    UserDataExportResponse:
      type: object
      description: 'Full personal data export for GDPR data portability'
      properties:
        exported_at:
          type: string
          format: date-time
          description: 'Timestamp when the export was generated'
        profile:
          type: object
          description: 'User profile data'
          properties:
            id:
              type: string
            username:
              type: string
            email:
              type: string
            about:
              type: string
              nullable: true
            currently_working_on:
              type: string
              nullable: true
            created_at:
              type: string
              format: date-time
        projects:
          type: array
          description: 'Projects uploaded by the user'
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
                nullable: true
              uploaded_at:
                type: string
                format: date-time
              views:
                type: integer
              downloads:
                type: integer
              private:
                type: boolean
        comments:
          type: array
          description: 'Comments written by the user'
          items:
            type: object
            properties:
              id:
                type: string
              text:
                type: string
              posted_at:
                type: string
                format: date-time
              parent_id:
                type: string
                nullable: true
        reactions:
          type: array
          description: 'Reactions (likes) given by the user'
          items:
            type: object
            properties:
              project_id:
                type: string
              type:
                type: string
              created_at:
                type: string
                format: date-time
                nullable: true
        followers:
          type: array
          description: 'Users who follow this user'
          items:
            type: object
            properties:
              id:
                type: string
              username:
                type: string
        following:
          type: array
          description: 'Users followed by this user'
          items:
            type: object
            properties:
              id:
                type: string
              username:
                type: string

    ErrorResponse:
      type: object
      description: 'Standard error response format used across all API endpoints'
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - type
            - message
          properties:
            code:
              type: integer
              description: 'HTTP status code'
              example: 422
            type:
              type: string
              description: 'Machine-readable error type'
              example: 'validation_error'
              enum:
                - 'validation_error'
                - 'bad_request'
                - 'unauthorized'
                - 'forbidden'
                - 'not_found'
                - 'not_acceptable'
                - 'unsupported_media_type'
                - 'unprocessable_entity'
                - 'too_many_requests'
                - 'internal_error'
            message:
              type: string
              description: 'Human-readable error summary'
              example: 'Validation failed'
            details:
              type: array
              description: 'Optional field-level error details (for validation errors)'
              items:
                type: object
                required:
                  - field
                  - message
                properties:
                  field:
                    type: string
                    description: 'The field that caused the error'
                    example: 'email'
                  message:
                    type: string
                    description: 'Human-readable error message for this field'
                    example: 'Email is required'

    ######################################################
    # Project Schemas
    ###

    # Request

    ProjectUploadRequest:
      type: object
      properties:
        checksum:
          type: string
          example: 'aqqoslcotroewlclcceadfgf'
          description: 'Checksum of the *.catrobat file'
        file:
          type: string
          format: binary
          description: 'The *.catrobat project file'
        flavor:
          type: string
          default: 'pocketcode'
          example: 'pocketcode'
          description: 'The flavor of this project'
        private:
          type: boolean
          description: 'Indicates whether a project should be private'
          default: false
          example: false
        project_id:
          type: string
          format: uuid
          description: 'Optional UUID of an existing project to update. When provided, the server matches by ID instead of by name, allowing project renames without creating duplicates.'
          example: '63768cf1-5f07-11ea-a2ae-000c292a0f49'
      required:
        - checksum
        - file

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          example: My amazing project
          description: 'The name of the project. minLength: 1 | maxLength: 255'
        description:
          type: string
          description: 'A description of the project.'
        credits:
          type: string
          description: 'Credits and notes for the project. E.g., credits for using ideas, scripts or artwork from other people.'
        private:
          type: boolean
          example: false
          description: 'Whether a project is publicly visible (false) or only via direct link (true).'
        screenshot:
          type: string
          example: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQ…'
          description: 'An image representing the project in data URI scheme.'
        not_for_kids:
          type: boolean
          example: false
          description: 'Mark the project as not suitable for kids (true) or safe for kids (false). Cannot be changed if set by a moderator.'

    ## Response

    FeaturedProjectsListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FeaturedProjectResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    FeaturedProjectResponse:
      type: object
      properties:
        id:
          type: string
          example: '1234abcd-12ab-12ab-12ab-123456abcdef'
        project_id:
          type: string
          example: '1234abcd-12ab-12ab-12ab-123456abcdef'
        project_url:
          type: string
          example: 'http://localhost:8080/app/project/37bf6d39-3fc3-11eb-977a-0242ac120004'
        url:
          type: string
          example: 'https://example.com/project/1234'
        name:
          type: string
          example: 'My example project'
        author:
          type: string
          example: 'Catrobat'
        featured_image:
          $ref: '#/components/schemas/ImageVariants'

    ProjectsCategoryListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProjectsCategory'

    ProjectsCategory:
      type: object
      properties:
        type:
          type: string
          example: 'recent'
          description: 'The name of the categories in english.'
        name:
          type: string
          example: 'Newest projects'
          description: 'Translated name according to the language header'
        projects_list:
          type: array
          description: 'Array of projects'
          items:
            $ref: '#/components/schemas/ProjectResponse'

    ProjectsListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProjectResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    ProjectResponse:
      type: object
      properties:
        id:
          type: string
          example: '1234abcd-12ab-12ab-12ab-123456abcdef'
          description: 'The unique identifier of the project'
        name:
          type: string
          description: 'The name of the project. minLength: 1 | maxLength: 255'
          example: 'My example project'
        author:
          type: string
          description: "The name of the projects' author"
          example: 'Catrobat'
        author_id:
          type: string
          description: "The unique identifier of the projects' author"
          example: '1234abcd-12ab-12ab-12ab-123456abcdef'
        scratch_id:
          type: integer
          nullable: true
          description: 'The scratch project ID if this project was imported from Scratch, null otherwise'
          example: null
        description:
          type: string
          description: 'A description of the project.'
          example: 'Check out my very cool project!'
        credits:
          type: string
          description: 'Credits and notes for the project. E.g., credits for using ideas, scripts or artwork from other people.'
          example: 'Special thanks to all contributors!'
        version:
          type: string
          description: 'The catrobat version that was used to create this project.'
          example: 0.9.66
        views:
          type: integer
          description: "The projects' count of views"
          example: 2
        downloads:
          type: integer
          description: "The projects' count of downloads"
          example: 2
        reactions:
          type: integer
          description: "The projects' count of reactions"
          example: 2
        comments:
          type: integer
          description: "The projects' count of comments"
          example: 2
        private:
          type: boolean
          description: 'Whether a project is publicly visible (false) or only via direct link (true).'
          example: false
        flavor:
          type: string
          example: 'pocketcode'
        tags:
          type: object
          description: 'Tags allow projects to be categorized by their creators. Keys are internal tag names, values are translated display names.'
          additionalProperties:
            type: string
          example: { 'game': 'Game', 'art': 'Art' }
        extensions:
          type: object
          description: 'Extensions used by this project (e.g., arduino, mindstorms). Keys are internal extension names, values are translated display names.'
          additionalProperties:
            type: string
          example: { 'arduino': 'Arduino', 'mindstorms': 'Mindstorms' }
        uploaded_at:
          type: string
          format: date-time
          description: 'The time of the upload in ISO 8601 format.'
          example: '2024-01-15T10:30:00+00:00'
        uploaded_string:
          type: string
          description: 'A localised text interpretation of the uploaded timestamp'
          example: 11 minutes ago
        screenshot:
          $ref: '#/components/schemas/ImageVariants'
        project_url:
          type: string
          description: 'The url to the project on our official share community platform'
          example: 'https://share.catrob.at/pocketcode/project/1234abcd-12ab-12ab-12ab-123456abcdef'
        download_url:
          type: string
          description: 'The url to GET the catrobat file of this project'
          example: 'https://share.catrob.at/api/projects/1234abcd-12ab-12ab-12ab-123456abcdef/catrobat'
        filesize:
          type: number
          example: 0.14381762458251943
          description: 'The filesize of the catrobat file in megabytes'
        not_for_kids:
          type: integer
          example: 0
          description: 'Indicates whether a project is suitable for kids or not (0 = safe for kids, 1 = not safe for kids, 2 = not safe for kids set by moderator)'
        retention_days:
          type: integer
          example: 365
          nullable: true
          description: 'Days until automatic deletion (-1 = protected/never). Only returned when explicitly requested via attributes parameter.'
        retention_expiry:
          type: string
          format: date-time
          nullable: true
          example: '2027-04-06T12:00:00+00:00'
          description: 'ISO 8601 date when the project will be auto-deleted. Null for protected projects. Only returned when explicitly requested.'

    ExtensionsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ExtensionResponse'

    ExtensionResponse:
      type: object
      properties:
        id:
          type: string
          example: 'embroidery'
          description: 'The internal title of the extension'
        text:
          type: string
          example: 'Embroidery'
          description: 'The translated text of the project extension.'

    TagsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TagResponse'

    TagResponse:
      type: object
      properties:
        id:
          type: string
          example: 'game'
          description: 'The internal title of the title'
        text:
          type: string
          example: 'Game'
          description: 'The translated text of the project tag.'

    ######################################################
    # Notification Schemas
    ###

    NotificationsCountResponse:
      type: object
      properties:
        total:
          type: integer
          example: 9
        like:
          type: integer
          example: 1
        follower:
          type: integer
          example: 0
        comment:
          type: integer
          example: 5
        remix:
          type: integer
          example: 3
        moderation:
          type: integer
          example: 0
        studio:
          type: integer
          example: 0
        project:
          type: integer
          example: 0

    NotificationListResponse:
      type: object
      properties:
        data:
          type: array
          description: 'Array of notifications'
          items:
            $ref: '#/components/schemas/NotificationResponse'
        next_cursor:
          type: string
          nullable: true
          description: 'Cursor for the next page, null if no more results'
        has_more:
          type: boolean
          description: 'Whether there are more results available'

    NotificationResponse:
      type: object
      properties:
        id:
          type: string
          example: '1234abcd-12ab-12ab-12ab-123456abcdef'
          description: 'Id of the notification'
        type:
          type: string
          enum:
            - 'reaction'
            - 'follow'
            - 'comment'
            - 'remix'
            - 'moderation'
            - 'studio'
            - 'project'
            - 'other'
          description: 'Notification Type'
        seen:
          type: boolean
          description: 'Seen status of the notification'
        from:
          description: 'Id of the user who caused the notification'
          allOf:
            - $ref: '#/components/schemas/Uuid'
        from_name:
          type: string
          example: 'Catroweb'
          description: 'Username of the user who caused the notification'
        project:
          description: 'Id of the project for which the notification is about'
          allOf:
            - $ref: '#/components/schemas/Uuid'
        project_name:
          type: string
          example: 'Awesome Game'
          description: 'Name of the project for which the notification is about'
        avatar:
          $ref: '#/components/schemas/ImageVariants'
        remixed_project:
          description: 'Id of the remixed project'
          allOf:
            - $ref: '#/components/schemas/Uuid'
        remixed_project_name:
          type: string
          example: 'Awesome Remixed Game'
          description: 'Name of the remixed project'
        message:
          type: string
          example: 'User1 created a remix Awesome Game of your game Awesome Remixed Game.'
          description: 'Notification message'
        prize:
          type: string
          description: 'Prize for anniversary notifications'

    ######################################################
    # Achievement Schemas
    ###

    AchievementsListResponse:
      type: object
      properties:
        unlocked:
          type: array
          items:
            $ref: '#/components/schemas/AchievementResponse'
        locked:
          type: array
          items:
            $ref: '#/components/schemas/AchievementResponse'
        most_recent:
          nullable: true
          allOf:
