openapi: 3.0.3
info:
  title: 'Catroweb API'
  description: 'API for the Catrobat Share Platform'
  version: 'v2.0.0'
  termsOfService: 'https://share.catrob.at/pocketcode/termsOfUse'
  contact:
    name: 'Catrobat'
    url: 'https://share.catrob.at'
    email: 'webmaster@catrobat.org'

servers:
  - url: 'https://share.catrob.at/api'
    description: 'Main production server'
  - url: 'https://web-test.catrob.at/api'
    description: 'Our test server (might be unstable)'
  - url: 'http://localhost/api'
    description: 'Local test server (postman help)'

tags:
  - name: 'Authentication'
    description: "
      * To have **full access** to all our features it is necessary to be **authenticated**.\n
      * Our authentication system utilizes **JWT** (https://jwt.io/introduction).\n
      * The bearer token you retrieve on login must be send in the **Authorization Header** of all following requests.\n
      - **Example**&#58; `curl -H \"Authorization: Bearer sagu4235afsyvyvdgsdqaWER22\" /route`
      "

  - name: 'Users'
    description: 'Everything related to users; from registration to managing their data.'

  - name: 'Projects'
    description: 'Everything related to projects'

  - name: 'Comments'
    description: 'Everything related to project comments'

  - name: 'Media Library'
    description: 'Everything related to the media library'

  - name: 'Utility'
    description: 'Utility functionality'

  - name: 'Notifications'
    description: 'Everything related for notifications'

  - name: 'Achievements'
    description: 'Everything related to achievements'

  - name: 'Search'
    description: 'Everything related to searching'

  - name: 'Studios'
    description: 'Create, join and update studios'

  - name: 'Followers'
    description: 'Everything related to user follow relationships'

  - name: 'Moderation'
    description: 'Content moderation: reporting, appeals, and admin review'

  - name: 'Translation'
    description: 'Machine and custom translations for projects'

paths:
  ##############################################
  # Authentication
  ###
  /authentication:
    get:
      security:
        - BearerAuth: []
      tags:
        - 'Authentication'
      summary: 'Check JWT token validity'
      description: 'Checks if a token is valid or expired.'
      responses:
        '200':
          $ref: '#/components/responses/OK'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      security:
        - BearerAuth: []
      tags:
        - 'Authentication'
      summary: 'Login - create a new JWT token'
      description: 'Returns an JWT token which provides authorization for a limited time'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/InvalidCredentials'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'

    delete:
      security:
        - BearerAuth: []
      tags:
        - 'Authentication'
      summary: 'Expires refresh token'
      description: 'Sets refresh token to expired'
      parameters:
        - $ref: '#/components/parameters/RefreshToken'
      responses:
        '200':
          $ref: '#/components/responses/OK'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/InvalidRefreshToken'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'

  /authentication/refresh:
    post:
      security:
        - BearerAuth: []
      tags:
        - 'Authentication'
      summary: 'Refresh token'
      description: 'Returns a new JWT token with help of the refresh token'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/InvalidRefreshToken'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'

  /authentication/oauth:
    post:
      tags:
        - 'Authentication'
      summary: 'OAuth Login'
      description: 'Returns an JWT token which provides authorization'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthLoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/InvalidIdToken'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  ##############################################
  # Utility
  ###
  /health:
    get:
      tags:
        - 'Utility'
      summary: 'Health Check'
      description: 'Returns application health status including database connectivity. Used for deployment smoke tests and monitoring.'
      responses:
        '200':
          description: 'System is alive and healthy'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: 'System is unhealthy (e.g. database unreachable)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /survey/{lang_code}:
    get:
      parameters:
        - in: path
          name: lang_code
          schema:
            type: string
            example: 'de'
          required: true
          description: '2 letter language code based on ISO 639-1 (e.g. German = de, English = en, Russian = ru)'
        - $ref: '#/components/parameters/Flavor'
        - $ref: '#/components/parameters/Platform'
      tags:
        - Utility
      summary: 'Get survey link for given language code.'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SurveyResponse'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'

  /languages:
    parameters:
      - $ref: '#/components/parameters/Locale'
    get:
      tags:
        - 'Utility'
      summary: 'Get available languages'
      description: 'Returns a map of language codes to their display names, localized to the Accept-Language header. Supports ETag-based HTTP caching (304 Not Modified).'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                example:
                  en: 'English'
                  de: 'German'
                  fr: 'French'
          headers:
            ETag:
              description: 'Locale-based ETag for cache validation'
              schema:
                type: string
        '304':
          description: 'Not Modified — cached response is still valid'

  /featured-banners:
    get:
      tags:
        - Utility
      summary: Get active featured banners
      operationId: featuredBannersGet
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: flavor
          in: query
          required: false
          schema:
            type: string
          description: 'Filter banners by flavor (e.g. pocketcode, luna). Omit for all.'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturedBannersListResponse'

  ##############################################
  # Users
  ###
  /users/me/data-export:
    get:
      security:
        - BearerAuth: []
      tags:
        - 'Users'
      summary: 'Export your personal data (GDPR)'
      description: '
        Returns a JSON export of all personal data associated with
        the authenticated user (GDPR right to data portability).
        Rate limited to 3 requests per day.
        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDataExportResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /users/me:
    get:
      security:
        - BearerAuth: []
      tags:
        - 'Users'
      summary: 'Get your private user data'
      description: '
        Get your private user data. Additionally to the public user data,
        this responses contains all your private data like settings.
        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtendedUserDataResponse'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '406':
          $ref: '#/components/responses/NotAcceptable'

    patch:
      parameters:
        - $ref: '#/components/parameters/Locale'
      security:
        - BearerAuth: []
      tags:
        - 'Users'
      summary: 'Update User'
      description: '
        Update your user account. All attributes are optional.
        For example you can update only the username.
        Or you can update multiple attributes at once. E.g. username + email.
        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '204':
          description: 'User successfully updated'
          # Content hack necessary else OpenAPI-generator will ignore content for error responses (hopefully fixed sometime)
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/InvalidCredentials'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      security:
        - BearerAuth: []
      tags:
        - 'Users'
      summary: 'Delete user account'
      description: 'Delete your user account. But be warned, there is no way to restore the user data!'
      responses:
        '204':
          description: User successfully deleted.
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/me/reports:
    get:
      security:
        - BearerAuth: []
      tags:
        - Moderation
      summary: 'List reports filed by the current user'
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserReportListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users:
    get:
      tags:
        - 'Users'
      summary: 'Get users'
      description: 'Get all users with their corresponding data. When query is provided, filters by keyword. Uses cursor-based pagination.'
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersListResponse'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
        '400':
          $ref: '#/components/responses/BadRequest'
        '406':
          $ref: '#/components/responses/NotAcceptable'

    post:
      parameters:
        - $ref: '#/components/parameters/Locale'
      tags:
        - Users
      summary: 'Register'
      description: '
        Register a user. For pre-validation use the dry-run option.
        Using Dry run the request is validated but no object is created on the server.
        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        201:
          description: 'User successfully registered'
          headers:
            Location:
              schema:
                type: string
                example: 'https://share.catrob.at/app/user/3ef85528-5f08-11ea-a2ae-000c292a0f49'
              description: Resource location on server
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTResponse'
        204:
          description: 'Dry-run successful (No Validation Error)'
        400:
          $ref: '#/components/responses/BadRequest'
        406:
          $ref: '#/components/responses/NotAcceptable'
        415:
          $ref: '#/components/responses/UnsupportedMediaType'
        422:
          $ref: '#/components/responses/UnprocessableEntity'

  /users/search:
    get:
      tags:
        - 'Users'
      summary: 'Search for users'
      description: 'Search for users associated by keywords. Uses cursor-based pagination.'
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Attributes'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersListResponse'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
        '400':
          $ref: '#/components/responses/BadRequest'
        '406':
          $ref: '#/components/responses/NotAcceptable'

  '/users/{id}':
    get:
      tags:
        - 'Users'
      summary: 'Get public user data'
      description: 'Get all the public data of a user'
      parameters:
        - $ref: '#/components/parameters/Uuid'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicUserDataResponse'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'

  /users/reset-password:
    post:
      tags:
        - 'Users'
      summary: 'Request email to reset password'
      description: '
        If an account with the provided email exists, an email to reset the password will be sent to the user.
        The email contains a link to reset the password. Note&#58; This link is only valid for a limited amount of time.
        '
      parameters:
        - $ref: '#/components/parameters/Locale'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: 'If an account with this email exists, an email to reset the password will be send to the user'
          # Content hack necessary else OpenAPI-generator will ignore content for error responses (hopefully fixed sometime)
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  ################################################
  # Projects
  #
  /projects:
    parameters:
      - $ref: '#/components/parameters/Locale'

    get:
      tags:
        - 'Projects'
      summary: 'Get projects'
      description: 'Get projects by category. When no category is specified, returns recent projects. Uses cursor-based pagination.'
      parameters:
        - $ref: '#/components/parameters/ProjectType'
        - $ref: '#/components/parameters/MaxVersion'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Attributes'
        - $ref: '#/components/parameters/Flavor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectsListResponse'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
        '400':
          $ref: '#/components/responses/BadRequest'
        '406':
          $ref: '#/components/responses/NotAcceptable'

    post:
      security:
        - BearerAuth: []
      tags:
        - 'Projects'
      summary: 'Upload a catrobat project'
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectUploadRequest'
      responses:
        '201':
          description: 'Project successfully uploaded'
          headers:
            Location:
              schema:
                type: string
                example: 'https://share.catrob.at/app/project/63768cf1-5f07-11ea-a2ae-000c292a0f49'
              description: 'Resource location on server'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /projects/featured:
    get:
      tags:
        - 'Projects'
      summary: 'Get the currently featured projects'
      description: 'Uses cursor-based pagination.'
      parameters:
        - $ref: '#/components/parameters/Platform'
        - $ref: '#/components/parameters/MaxVersion'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Attributes'
        - $ref: '#/components/parameters/Flavor'
      responses:
        '200':
          description: 'OK'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturedProjectsListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '406':
          $ref: '#/components/responses/NotAcceptable'

  /projects/categories:
    get:
      tags:
        - 'Projects'
      summary: 'Get default number of projects per category (Most downloaded etc.)'
      parameters:
        - $ref: '#/components/parameters/MaxVersion'
        - $ref: '#/components/parameters/Flavor'
        - $ref: '#/components/parameters/Locale'
      responses:
        '200':
          description: OK
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectsCategoryListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '406':
          $ref: '#/components/responses/NotAcceptable'

  /projects/search:
    get:
      tags:
        - 'Projects'
      summary: 'Search for projects associated with a keywords'
      description: 'Uses cursor-based pagination.'
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/MaxVersion'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Attributes'
        - $ref: '#/components/parameters/Flavor'
      responses:
        '200':
          description: 'OK'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectsListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '406':
          $ref: '#/components/responses/NotAcceptable'

  /projects/user:
    get:
      security:
        - BearerAuth: []
      tags:
        - 'Projects'
      summary: 'Get the projects of the logged in user'
      description: 'Uses cursor-based pagination.'
      parameters:
        - $ref: '#/components/parameters/MaxVersion'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Attributes'
        - $ref: '#/components/parameters/Flavor'
      responses:
        '200':
          description: 'OK'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectsListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '406':
          $ref: '#/components/responses/NotAcceptable'

  '/projects/user/{id}':
    get:
      tags:
        - 'Projects'
      summary: 'Get the public projects of a given user'
      description: 'Uses cursor-based pagination.'
      parameters:
        - $ref: '#/components/parameters/Uuid'
        - $ref: '#/components/parameters/MaxVersion'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Attributes'
        - $ref: '#/components/parameters/Flavor'
      responses:
        '200':
          description: 'OK'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectsListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'

  '/projects/extensions':
    parameters:
      - $ref: '#/components/parameters/Locale'
    get:
      tags:
        - 'Projects'
      summary: 'Get all possible project extensions. Extensions are automatically added to projects based on their bricks.'
      responses:
        '200':
          description: 'OK'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionsResponse'
        '406':
          $ref: '#/components/responses/NotAcceptable'

  '/projects/tags':
    parameters:
      - $ref: '#/components/parameters/Locale'
    get:
      tags:
        - 'Projects'
      summary: 'Get all possible project tags. Some Tags will only be available during events.'
      responses:
        '200':
          description: 'OK'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsResponse'
        '406':
          $ref: '#/components/responses/NotAcceptable'

  '/projects/{id}':
    get:
      tags:
        - 'Projects'
      summary: 'Get the information of a project'
      parameters:
        - $ref: '#/components/parameters/Uuid'
      responses:
        '200':
          description: 'OK'
          headers:
            X-Response-Hash:
              $ref: '#/components/headers/X-Response-Hash'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
          content:
            application/json:
              schema:
