  '/media/assets':
    parameters:
      - $ref: '#/components/parameters/Locale'

    get:
      tags:
        - 'Media Library'
      summary: 'Get media library assets with pagination and filtering'
      description: 'Uses cursor-based pagination.'
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: category_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: 'Filter by category UUID'
        - name: file_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - IMAGE
              - SOUND
        - name: flavor
          in: query
          required: false
          schema:
            type: string
          description: 'Filter by flavor name'
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: 'Search in name and description'
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [name, created_at, downloads, updated_at]
            default: created_at
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
        - name: flavors
          in: query
          required: false
          schema:
            type: string
          description: 'Comma-separated flavor names to rank results by. Matching assets appear first (ranked by overlap count), then flavorless assets, then non-matching flavored assets.'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAssetsListResponse'
