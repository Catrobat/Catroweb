        created_at:
          type: string
          format: date-time
        resolution_note:
          type: string
          nullable: true

    AppealListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AppealResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    CodeViewResponse:
      type: object
      properties:
        scenes:
          type: array
          items:
            $ref: '#/components/schemas/CodeViewScene'

    CodeViewScene:
      type: object
      properties:
        name:
          type: string
          example: 'Scene 1'
        objects:
          type: array
          items:
            $ref: '#/components/schemas/CodeViewObject'

    CodeViewObject:
      type: object
      properties:
        name:
          type: string
          example: 'Sprite1'
        is_group:
          type: boolean
          example: false
        scripts:
          type: array
          items:
            $ref: '#/components/schemas/CodeViewScript'
        looks:
          type: array
          items:
            $ref: '#/components/schemas/CodeViewAsset'
        sounds:
          type: array
          items:
            $ref: '#/components/schemas/CodeViewAsset'
        children:
          type: array
          nullable: true
          description: 'Child objects if this is a group sprite'
          items:
            $ref: '#/components/schemas/CodeViewObject'

    CodeViewAsset:
      type: object
      properties:
        name:
          type: string
          example: 'cat_look'
        url:
          type: string
          nullable: true
          example: '/resources/extract/abc123/images/cat_look.png'

    CodeViewScript:
      type: object
      properties:
        type:
          type: string
          example: 'StartScript'
        category:
          type: string
          example: 'event'
        display_text:
          type: string
          example: 'When program started'
        commented_out:
          type: boolean
          example: false
        bricks:
          type: array
          items:
            $ref: '#/components/schemas/CodeViewBrick'

    CodeViewBrick:
      type: object
      properties:
        type:
          type: string
          example: 'PlaceAtBrick'
        category:
          type: string
          example: 'motion'
        display_text:
          type: string
          example: 'Place at X: 100 Y: 200'
        commented_out:
          type: boolean
          example: false
        parameters:
          type: object
          nullable: true
          additionalProperties:
            type: string
          example:
            X_POSITION: '100'
            Y_POSITION: '200'
        children:
          type: object
          nullable: true
          description: 'Nested bricks for control-flow structures (if/else, loops)'
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/CodeViewBrick'
          example: null

    CodeStatisticsResponse:
      type: object
      properties:
        score_abstraction:
          type: integer
          description: 'Abstraction score (0-6)'
          example: 6
        score_parallelism:
          type: integer
          description: 'Parallelism score (0-6)'
          example: 3
        score_synchronization:
          type: integer
          description: 'Synchronization score (0-6)'
          example: 3
        score_logical_thinking:
          type: integer
          description: 'Logical thinking score (0-6)'
          example: 3
        score_flow_control:
          type: integer
          description: 'Flow control score (0-6)'
          example: 4
        score_user_interactivity:
          type: integer
          description: 'User interactivity score (0-6)'
          example: 3
        score_data_representation:
          type: integer
          description: 'Data representation score (0-6)'
          example: 6
        score_bonus:
          type: integer
          description: 'Bonus points awarded for physics or extension usage'
          example: 2
        score_total:
          type: integer
          description: 'Sum of all category scores and bonus points'
          example: 27
        scoring_version:
          type: string
          description: 'Identifier of the rubric version used to compute the scores'
          example: 'rubric_2021_v1'

    RemixGraphResponse:
      type: object
      required:
        - projectId
        - projectCount
        - scratchCount
        - remixCount
        - nodes
        - edges
      properties:
        projectId:
          type: string
          description: 'ID of the project for which the remix graph was requested'
          example: '1234abcd-12ab-12ab-12ab-123456abcdef'
        projectCount:
          type: integer
          description: 'Number of Catrobat projects in the connected remix graph'
          example: 7
        scratchCount:
          type: integer
          description: 'Number of Scratch projects in the connected remix graph'
          example: 2
        remixCount:
          type: integer
          description: 'Number of remixes in the connected Catrobat graph'
          example: 6
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/RemixGraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/RemixGraphEdge'

    RemixGraphNode:
      type: object
      required:
        - id
        - projectId
        - source
        - available
        - name
        - username
        - thumbnailUrl
      properties:
        id:
          type: string
          description: 'Graph node id composed of source and project id'
          example: 'catrobat_1234abcd-12ab-12ab-12ab-123456abcdef'
        projectId:
          type: string
          description: 'Project ID in its source namespace'
          example: '1234abcd-12ab-12ab-12ab-123456abcdef'
        source:
          type: string
          enum:
            - 'catrobat'
            - 'scratch'
          description: 'Source platform of the node'
        available:
          type: boolean
          description: 'Whether project metadata is available on the server'
          example: true
        name:
          type: string
          nullable: true
          description: 'Project title, if available'
          example: 'My Remix'
        username:
          type: string
          nullable: true
          description: 'Username of the project owner, if available'
          example: 'Catrobat'
        thumbnailUrl:
          type: string
          description: 'Thumbnail URL resolved from project source and availability'
          example: '/images/default/thumbnail.png'

    RemixGraphEdge:
      type: object
      required:
        - id
        - from
        - to
      properties:
        id:
          type: string
          description: 'Unique edge id'
          example: 'edge_0'
        from:
          type: string
          description: 'Source node id'
          example: 'catrobat_1234abcd-12ab-12ab-12ab-123456abcdef'
        to:
          type: string
          description: 'Target node id'
          example: 'catrobat_2234abcd-12ab-12ab-12ab-123456abcdef'
