      parameters:
        - $ref: '#/components/parameters/Uuid'
        - name: target_language
          in: query
          required: true
          description: 'Target language (ISO 639-1 or BCP 47)'
          schema:
            type: string
            example: 'de'
        - name: source_language
          in: query
          required: false
          description: 'Optional source language override'
          schema:
            type: string
            example: 'en'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectTranslationResponse'
