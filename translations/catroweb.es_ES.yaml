passwordRecovery:
  subject: Recuperación de su clave Catrobat
  message: |
    Estimado %username%.
    Ha solicitado restablecer su contraseña en %appplication_url% porque ha olvidado su contraseña.
    Si no has solicitado esto, por favor ignóralo. Expirará y se convertirá en inútil en 24 horas.
    Para restablecer tu contraseña y crear una nueva, por favor visita la siguiente página: %confirmationUrl%
    Puedes usar tu nombre de usuario y tu contraseña en cualquier momento para acceder a la comunidad %appplication_url% .
    Para ello, solo visita la siguiente página: %loginPage%
    Para editar los detalles de tu perfil, ve a esta página: %profilePage%
    Saludos cordiales,
    Tu equipo de Catrobat.
  messageHtml: |
    <p>
    Estimado %username%.<br>
    <br>
    Ha solicitado restablecer su contraseña en <a href=%appplication_url%>Código de bolsillo</a> porque ha olvidado su contraseña.
    Si no lo ha solicitado, por favor, ignórelo. Caducará y quedará inservible en 24 horas.<br>
    <br>
    Para restablecer su contraseña y crear una nueva, haga clic en <a href=%confirmationUrl%>aquí.</a><br>
    <br>
    Puedes utilizar tu nombre de usuario y tu contraseña en cualquier momento para acceder a la comunidad <a href=%appplication_url%>Código de bolsillo</a>.<br>
    Para ello, sólo tienes que visitar la siguiente página: <a href=%loginPage%>Página de inicio de sesión</a><br>
    Para editar los datos de su perfil, vaya a esta página <a href=%profilePage%></a>.<br>
    <br>
    Saludos cordiales,<br>
    Tu equipo de Catrobat.
    </p>
