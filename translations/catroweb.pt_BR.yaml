consent:
  email:
    subject: "Parental consent needed for your child's Catrobat account"
    title: "Parental Consent Required"
    greeting: "Hello,"
    message: "Your child %username% has created an account on Catrobat and has verified their email address."
    explanation: "Catrobat is a free educational platform where young people learn to code by creating apps, games, and animations. Under EU child protection regulations, we need your consent before your child can fully participate in the community. Please click the button below to give consent."
    button: "Give Parental Consent"
    ignore: "If you did not expect this email, you can safely ignore it. Without consent, the account will have limited functionality."
    whatIsCatrobat: "Catrobat is a free, non-profit educational programming platform. Learn more at catrobat.org."
    manageLink: 'You can manage your child''s account at any time via our <a href="%portalUrl%" style="color: #00acc1;">Parent Portal</a>. Learn more about <a href="%infoUrl%" style="color: #00acc1;">your rights as a parent</a>.' #00acc1;">Parent Portal</a>. Learn more about <a href="%infoUrl%" style="color: #00acc1;">your rights as a parent</a>.'
  confirmed:
    title: "Consent Granted"
    message: "Thank you! %username%'s account is now fully activated."
    continueButton: "Discover projects"
parent:
  footer:
    link: "Parents & Guardians"
  info:
    title: "Information for Parents & Guardians"
    intro: "Catrobat takes the safety and privacy of young users seriously. This page explains how we protect your child and what rights you have."
    whatIsCatrobat:
      title: "What is Catrobat?"
      text: "Catrobat is a free, non-profit educational platform where young people learn programming by creating their own apps, games, and animations. The platform is available worldwide and used in educational settings."
    dataCollected:
      title: "What data do we collect?"
      text: "We collect the minimum data needed to operate the platform: username, email address, date of birth, and any projects your child creates and uploads. For users under 14, we also store a parent/guardian email address for consent purposes. We do not sell or share personal data with third parties."
    yourRights:
      title: "Your rights as a parent or guardian"
      text: "Under EU child protection regulations (GDPR) and COPPA, you have the right to: review the data we hold about your child, request a copy of that data, revoke your consent at any time (which restricts the account), and request permanent deletion of your child's account and all associated data."
    minorRestrictions:
      title: "What restrictions apply to minor accounts?"
      text: "Users under 16 cannot post or read comments, follow other users, or view content marked as not suitable for children. They can still create and upload projects, browse public projects, and react to projects with likes. These restrictions are in place to provide a safe learning environment."
    manageButton: "Manage Your Child's Account"
  portal:
    title: "Parent Portal"
    description: "Enter your email address to receive a secure link for managing your child's Catrobat account. The link will be sent to the email address you provided during registration."
    emailLabel: "Your email address"
    submitButton: "Send Management Link"
    infoLink: "Learn More"
    success:
      title: "Check your inbox"
      message: "If an account is associated with this email, we've sent a management link. Please check your inbox and follow the link to manage your child's account."
  manage:
    title: "Manage Child Accounts"
    description: "You are managing accounts associated with %email%."
    consentStatus: "Consent status"
    accountCreated: "Account created"
    email: "Child's email"
    status:
      granted: "Granted"
      pending: "Pendente"
      revoked: "Revoked"
    grantButton: "Grant Consent"
    revokeButton: "Revoke Consent"
    revokeConfirm: "Are you sure you want to revoke consent? The account will have limited functionality."
    exportButton: "Export Data"
    deleteButton: "Delete Account"
    deleteConfirm: "Are you sure you want to permanently delete this account? This cannot be undone."
  management:
    email:
      subject: "Manage your child's Catrobat account"
      title: "Account Management"
      greeting: "Hello,"
      message: "You requested a link to manage your child's Catrobat account (%usernames%). Click the button below to view and manage the account."
      button: "Manage Account"
