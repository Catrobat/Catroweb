passwordRecovery:
  subject: Sua recuperação de senha Catrobat
  message: |
    Caro %username%.
    Você solicitou a redefinição de sua senha em %appplication_url% porque a esqueceu.
    Se você não solicitou isso, ignore. Ele irá expirar e se tornar inútil em 24 horas.
    Para redefinir sua senha e criar uma nova, visite a seguinte página: %confirmationUrl%
    Você pode usar seu nome de usuário e senha a qualquer momento para acessar a comunidade %appplication_url%.
    Para isso, basta visitar a seguinte página: %loginPage%
    Para editar os detalhes do seu perfil, vá para esta página: %profilePage%
    Atenciosamente,
    Sua equipe Catrobat.
  messageHtml: |
    <p>
    Caro(a) %username%.<br>
    <br>
    Você solicitou redefinir sua senha no <a href=%appplication_url%>Pocket Code</a> por tê-la esquecido.
    Se você não fez esta solicitação, por favor, ignore-a. Ela expirará e se tornará inutilizável em 24 horas.<br>
    <br>
    Para redefinir sua senha e criar uma nova, por favor clique <a href=%confirmationUrl%>aqui.</a><br>
    <br>
    Você pode usar seu nome de usuário e senha a qualquer momento para acessar a <a href=%appplication_url%>comunidade</a> Pocket Code.<br>
    Para isso, siga para a página: <a href=%loginPage%>Página de Login</a><br>
    Para alterar os detalhes do seu perfil, siga para esta <a href=%profilePage%>página</a>.<br>
    <br>
    Sinceros cumprimentos,<br>
    Seu Time Your Catrobat.
    </p>
