passwordRecovery:
  subject: Відновлення пароля Catrobat
  message: |
    Шановний(-на) %username%.
    Ви попросили скинути пароль на %appplication_url%, оскільки забули його.
    Якщо ви цього не просили, будь ласка, проігноруйте це. Він закінчиться і стане марним через 24 години.
    Щоб скинути пароль і створити новий, відвідайте наступну сторінку: %confirmationUrl%
    Ви можете будь-коли використовувати своє імʼя користувача та пароль для доступу до спільноти %appplication_url%.
    Для цього просто відвідайте наступну сторінку: %loginPage%
    Щоб змінити відомості про профіль, перейдіть на цю сторінку: %profilePage%
    З найщирішими побажаннями
    Команда Catrobat.
  messageHtml: |
    <p>
    Шановний(а) %username%.<br>
    <br>
    Ви запросили скинути пароль в <a href="%appplication_url%">Pocket Code</a>, оскільки забули його.
    Якщо ви цього не просили, будь ласка, проігноруйте це. Він закінчиться і стане марним через 24 години. <br>
    <br>
    Щоб скинути пароль і створити новий, натисніть <a href="%confirmationUrl%">тут</a>.<br>
    <br>
    Ви можете використовувати своє імʼя користувача та пароль у будь-який час для доступу до спільноти <a href="%appplication_url%">Pocket Code</a>.<br>
    Для цього просто відвідайте наступну сторінку: <a href="%loginPage%">Сторінка входу</a><br>
    Щоб змінити відомості профілю, перейдіть на цю <a href="%profilePage%">сторінку</a>.<br>
    <br>
    З найщирішими побажаннями<br>
