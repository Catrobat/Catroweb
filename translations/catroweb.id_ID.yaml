passwordRecovery:
  subject: Pemulihan Kata Sandi Catrobat Anda
  message: |
    %username% yang terhormat.
    Anda telah meminta untuk menyetel ulang kata sandi Anda di %appplication_url% karena Anda lupa kata sandi Anda.
    Jika Anda tidak memintanya, harap abaikan. Ini akan kedaluwarsa dan menjadi tidak berguna dalam waktu 24 jam.
    Untuk mereset kata sandi Anda dan membuat yang baru, silakan kunjungi halaman berikut: %confirmationUrl%
    Anda dapat menggunakan nama pengguna dan sandi Anda kapan saja untuk mengakses komunitas %appplication_url%.
    Untuk melakukannya, cukup kunjungi halaman berikut: %loginPage%
    Untuk mengedit detail profil Anda, buka halaman ini: %profilePage%
    Salam Hormat,
    Tim Catrobat Anda.
  messageHtml: |
    <p>
    Halo %username%. <br>
    <br>
    Anda telah meminta untuk mengatur ulang kata sandi Anda di <a href=%appplication_url%> Pocket Code </a> karena Anda lupa kata sandi Anda.
    Jika Anda tidak memintanya, harap abaikan. Ini akan kedaluwarsa dan menjadi tidak berguna dalam waktu 24 jam. <br>
    <br>
    Untuk menyetel ulang sandi Anda dan membuat yang baru, harap klik <a href=%confirmationUrl%> di sini. </a> <br>
    <br>
    Anda dapat menggunakan nama pengguna dan sandi Anda kapan saja untuk mengakses komunitas <a href=%appplication_url%> Pocket Code </a>. <br>
    Untuk melakukannya, cukup kunjungi halaman berikut: <a href=%loginPage%> Halaman Login </a> <br>
    Untuk mengedit detail profil Anda, buka <a href=%profilePage%> halaman </a> ini. <br>
    <br>
    Salam, <br>
    Tim Catrobat Anda.
    </p>
