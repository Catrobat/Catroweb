passwordRecovery:
  subject: بازیابی رمز عبورت در کت ربات
  message: |
    محترم %username%.
    شما درخواست کرده اید رمز عبور خود را در %appplication_url% بازنشانی کنید زیرا رمز عبور خود را فراموش کرده اید.
    اگر این را درخواست نکردید، لطفاً آن را نادیده بگیرید. در عرض 24 ساعت منقضی می شود و بی فایده می شود.
    برای بازنشانی رمز عبور و ایجاد رمز عبور جدید، لطفاً به صفحه زیر مراجعه کنید:%confirmationUrl%
    شما می توانید در هر زمان از نام کاربری و رمز عبور خود برای دسترسی به انجمن %appplication_url% استفاده کنید.
    برای این کار کافیست به صفحه زیر مراجعه کنید:%loginPage%
    برای ویرایش مشخصات پروفایل خود به این صفحه بروید:%profilePage%
    با احترام،
    تیم کاتروبات شما



  messageHtml: |
    <p>
    محترم%username%<br>
    <br>
    شما درخواست کرده اید که رمز عبور خود را بازنشانی در <a href=%appplication_url%> Pocket Code</a> زیرا رمز عبور خود را فراموش کرده اید.
    اگر این را درخواست نکردید، لطفاً آن را نادیده بگیرید. در عرض 24 ساعت منقضی می شود و بی فایده می شود.<br>
    <br>
    برای تنظیم مجدد رمز عبور و ایجاد رمز عبور جدید، لطفا <a href=%confirmationUrl%>اینجا</a><br> کلیک کنید
    <br>
    شما می توانید در هر زمان از نام کاربری و رمز عبور خود برای دسترسی به انجمن<a href=%appplication_url%> Pocket Code </a>استفاده کنید.<br>
    برای انجام این کار، فقط به صفحه زیر مراجعه کنید: <a href=%loginPage%>صفحه ورود</a><br>
    برای ویرایش مشخصات پروفایل خود به این <a href=%profilePage%> صفحه</a>.<br> بروید
    <br>
    با احترام،<br>
    تیم کاتروبات شما
    </p>
