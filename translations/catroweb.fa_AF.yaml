passwordRecovery:
  subject: Your Catrobat Password Recovery
  message: |
    %username% عزیر.
    شما درخواست کرده اید رمز عبور خود را در %appplication_url% بازنشانی کنید چون که رمز عبور خود را فراموش کرده اید. اگر درخواست نکردید، لطفا این را نادیده بگیرید. این در ۲۴ ساعت زمان منقضی و غیر قابل استفاده خواهد شد.
    برای بازنشانی گذرواژه خود و ایجاد یک جدید، لطفا از صفحه زیر دیدن کنید:
    %confirmationUrl%
    شما می توانید از نام کاربری و رمز عبور خود در هر زمان برای دسترسی به %appplication_url% جامعه. 
    برای انجام این کار، فقط از صفحه زیر بازدید کنید: %loginPage%
    برای ویرایش مشخصات پروفایل خود، به این صفحه بروید: %profilePage%
    با احترام،
    تیم کاتروبات Catrobat شما. 
  messageHtml: |
    <p>
    %username% عزیز.<br>
    <br>
    شما درخواست کرده اید رمز عبور خود را بازنشانی کنید در <a href=%appplication_url%> پاکت کود</a>چون که رمز عبور خود را فراموش کرده اید.
    اگر این را درخواست نکردید، لطفا آن را نادیده بگیرید. آن را منقضی خواهد شد و بی فایده در ۲۴ ساعت زمان.<br>
    <br>
    برای بازنشانی رمز عبور خود و ایجاد یک جدید، لطفا اینجا را کلیک کنید <a href=%confirmationUrl%>اینجاد </a> <br>
    <br>
    شما می توانید از نام کاربری و رمز عبور خود در هر زمان برای دسترسی به <a href=%appplication_url%>پاکت کود</a>اجتماع<br> استفاده کنید
    برای انجام این کار، فقط از این صفحه را بازدید کنید: <a href=%loginPage%>صفحه ورود به سیستم</a><br>
    برای ویرایش مشخصات مشخصات خود، به این بروید <a href=%profilePage%> صفحه</a><br>
    <br>
    با احترام،<br>
    گروه کاتروبات شما. 
    </p> 
