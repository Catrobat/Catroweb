passwordRecovery:
  subject: ستاسو د Catrobat پټنوم بیا رغونه
  message: |
    ګرانه %username%.
    تاسو په %appplication_url% کې د خپل پټنوم د بیا تنظیمولو غوښتنه کړې ده ځکه چې تاسو خپل پټنوم هیر کړی دی.
