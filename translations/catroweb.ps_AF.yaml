    د خپل پټنوم بیا تنظیمولو او یو نوی جوړولو لپاره، مهرباني وکړئ لاندې پاڼې ته لاړ شئ:
    %confirmationUrl%
    تاسو کولی شئ خپل کارن-نوم او خپل پټنوم په هر وخت کې د %appplication_url% ټولنې ته د لاسرسي لپاره وکاروئ.
    د دې کولو لپاره، یوازې لاندې پاڼې ته لاړ شئ: %loginPage%
    د خپل پروفایل توضیحاتو سمولو لپاره، دې پاڼې ته لاړ شئ: %profilePage%
    غوره احترامات،
    ستاسو د Catrobat ټیم.


  messageHtml: |
    <p>
    ګرانه %username%.<br>
    <br>
    تاسو په <a href=%appplication_url%>جیب کوډ</a> کې د خپل پټنوم د بیا تنظیمولو غوښتنه کړې ځکه چې تاسو خپل پټنوم هیر کړی دی.
    که تاسو دا غوښتنه نه ده کړې، مهرباني وکړئ دا یې له پامه غورځوئ. دا به په 24 ساعتونو کې پای ته ورسیږي او بې ګټې شي.<br>
    <br>
    د دې لپاره چې خپل پټنوم بیا تنظیم کړئ او یو نوی جوړ کړئ، مهرباني وکړئ کلیک وکړئ<a href=%confirmationUrl%>دلته.</a><br>
    <br>
    تاسو کولی شئ هر وخت خپل کارن نوم او پټنوم وکاروئ ترڅو د<a href=%appplication_url%>د جیب کوډ</a> ټولنې ته لاسرسی ومومئ.<br>
    د دې کولو لپاره، یوازې لاندې پاڼې ته لاړ شئ:<a href=%loginPage%>د ننوتلو پاڼه</a><br>
    د خپل پروفایل توضیحاتو سمولو لپاره، دې <a href=%profilePage%>پاڼې ته لاړ شئ</a>.<br>
