  text1: تاسو ته زموږ د خدماتو او اړوند حساب ټولې ګټې وړاندیز کولو لپاره ، دا اړینه ده چې له تاسو څخه ځینې معلومات راټول کړئ.
  text2: زموږ د خدماتو (ایپس او ویب پاڼو) ساتلو او ښه کولو لپاره او د ICT او STEM/STEAM تعلیم په اړه ساینسي څیړنې ترسره کولو لپاره، موږ د Google Analytics، Crashlytics، او Firebase څخه کار اخلو، ټول د Google LLC (USA) لخوا، او همدارنګه د Dynatrace LLC لخوا Dynatrace (. USA) زموږ د خدماتو کارولو په اړه د میټاډاټا ترلاسه کولو لپاره، د بیلګې په توګه، د حادثې معلومات، مهال ویش، لیدل شوي پاڼې/اسکرین، زموږ د ایپسونو او خدماتو کارول، کارول شوي عملیاتي سیسټم، او د شبکې چمتو کونکي په اړه معلومات. دا تحلیل او راټول شوي ډاټا ستاسو د پروفایل سره تړاو نلري او هیڅ شخصي معلومات نلري (د IP پتې وروستي بټونه نامعلوم کیږي). په هرصورت، راټول شوي ډاټا به د خدماتو چمتو کونکو ته لیږدول کیږي (Google LLC، USA او Dynatrace LLC، USA). د معلوماتو پروسس کول د ګوګل LLC او Dynatrace LLC سره د تړونونو پراساس دي. د خدماتو چمتو کونکو سره دا اړیکه د اروپایی اتحادیې د عمومي معلوماتو محافظت مقرراتو (EU GDPR) او EU-USA "د محرمیت شیلډ" تړون سره مطابقت لري.
  text3: زموږ په سیسټمونو کې د حساب رامینځته کولو او کارولو لپاره ، او تاسو ته په بریښنالیک کې ستاسو د حساب په اړه د اړینو بدلونونو په اړه خبر ورکولو لپاره ، د بیلګې په توګه زموږ د کارونې او خدماتو شرایطو تازه کول یا سرغړونې ، زموږ د ټولنې قواعد ، یا زموږ پالیسي، موږ به ستاسو ذخیره ذخیره کړو. کارن نوم او که ستاسو لخوا چمتو شوی وي، ستاسو بریښنالیک پته. که تاسو خپل حساب د ګوګل پلس یا فیسبوک له لارې وصل کړی وي، نو موږ په دې خدماتو کې ستاسو د حساب سره وصل د پیژندنې کیلي هم ذخیره کوو. موږ به دا معلومات د کوم بل (د بیلګې په توګه، بازار موندنه) موخو لپاره ونه کاروو، پرته لدې چې تاسو موږ ته په واضح ډول اجازه راکړئ چې دا کار وکړو.
  text4: په داوطلبانه توګه، تاسو کولی شئ موږ ته د شریکولو سایټ کې د خپل حساب پاڼې له لارې خپل د اوسیدو هیواد راکړئ. دا به ستاسو په عامه پروفایل کې ښکاره شي او یوازې زموږ لخوا د احصایې او څیړنې موخو لپاره کارول کیږي. دا ستاسو د پروفایل تنظیماتو کې هر وخت لرې کیدی شي.
  text5: تاسو کولی شئ په هر وخت کې په https://share.catrob.at کې د خپل پروفایل پاڼې له لارې خپل حساب حذف کولو سره ستاسو د حساب پورې اړوند شخصي معلوماتو کارول بیرته واخلئ. د خپل حساب له مینځه وړلو وروسته به تاسو لاهم وکولی شئ چمتو شوي خدمات وکاروئ ، مګر د همکارۍ لپاره نه ، د مثال په توګه د برنامو اپلوډ کولو ، تبصرې کولو یا خوښولو له لارې. همدارنګه، ستاسو د حساب سره تړل شوي ټول چمتو شوي مواد، د بیلګې په توګه، اپلوډ شوي پروګرامونه، تبصرې، او نور به حذف شي.
  text6: زموږ د خدماتو څخه د ناوړه ګټې اخیستنې مخنیوي لپاره، د بیلګې په توګه، د غیرقانوني موخو لپاره د کاروونکي لخوا د اپلوډونو یا تبصرو له لارې، د کاروونکي ټول تولید شوي عامه ډاټا (اپلوډونه، تبصرې) به په ډیټابیس کې دننه ذخیره شي، د مهال ویش او کارول شوي انټرنیټ پته سره. دا معلومات به د هیڅ ادارې لخوا نه کارول کیږي یا لیږل کیږي، پرته لدې چې په کافي اندازه غیرقانوني کړنې په معقول ډول شکمن وي او په رسمي توګه حق لرونکي حقوقي ادارې د پلي شوي قانون پراساس د دې غوښتنه کوي. هره قضیه به لومړی زموږ لخوا په انفرادي ډول په کلکه وڅیړل شي.
  text7: تاسو کولی شئ په داوطلبانه توګه د کاټروباټ نیوز لیټر کې ګډون وکړئ ، په https://catrob.at/newsletter کې چې زموږ لخوا د میل چیمپ خدمت له لارې چمتو شوي (د راکټ ساینس ګروپ LLC d/b/a MailChimp, USA). بیا به تاسو د کاټروباټ پروژې او د هغې خدماتو په اړه تازه معلومات ستاسو چمتو شوي بریښنالیک آدرس ته ترلاسه کړئ. تاسو کولی شئ د هرې خبرپاڼې په فوټر کې د "غیر ګډون" لینک په کارولو سره هر وخت خبر پاڼه بیرته واخلئ. دا خبر پاڼه د MailChimp لخوا چمتو شوې چې ورسره موږ د ډیټا پروسس کولو تړون لرو او څوک چې د EU عمومي ډیټا پروډیکشن مقرراتو او EU-USA "د محرمیت شیلډ" ته ژمن دی. د MailChimp په اړه د نورو جزیاتو لپاره مهرباني وکړئ د MailChimp د محرمیت پالیسي او د کارولو شرایط هم وګورئ.
  text8: ټول خدمتونه د وړیا خلاصې سرچینې کاټروباټ پروژې لخوا د نړیوال کاټروبیټ ټولنې تر چتر لاندې چمتو شوي - ویرین زیور فرډرینګ فریر سافټویر ، یوه غیر انتفاعي غیر انتفاعي موسسه چې په ګراز، اتریش (اروپایي اتحادیه) کې جوړه شوې. زموږ پالیسۍ د EU او اتریش د معلوماتو محافظت قانون (GDPR) ته درناوی کوي. له موږ سره د تماس لپاره، مهرباني وکړئ contact@catrobat.org ته بریښنالیک واستوئ یا موږ ته د کاټروباټ، c/o د سافټویر ټیکنالوژۍ انسټیټیوټ، د ټیکنالوژۍ پوهنتون، انفیلډګاس 16b، A-8010 ګرز، اتریش (اروپایي اتحادیه) ته واستوئ ).
  text9: په هغه صورت کې چې تاسو د ۱۴ کلنۍ څخه کم عمر لرئ، دا پالیسي باید د قانوني سرپرست (معمولا مور او پلار) لخوا ومنل شي.
  text10: د Catrobat رسمي انګلیسي ژبې د محرمیت پالیسي په ویب کې د  %privacy_policy% لاندې شتون لري.
  disagree-text: د تایید پرته، موږ نشو کولی حساب جوړ کړو مګر اصلي ځانګړتیاوې لاهم د لاسرسي وړ دي.
