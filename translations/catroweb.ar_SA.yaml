passwordRecovery:
  subject: استعادة كلمة سر كاتروبات الخاصة بك
  message: |
    عزيزي %username%
    لقد طلبت إعادة تعيين كلمة المرور الخاصة بك في %appplication_url% لأنك نسيت كلمة المرور الخاصة بك.
    إذا لم تطلب ذلك، يرجى تجاهله. ستنتهي صلاحيتها وتصبح عديمة الفائدة في غضون 24 ساعة.
    لإعادة تعيين كلمة المرور الخاصة بك وإنشاء كلمة مرور جديدة، يرجى زيارة الصفحة التالية: %confirmationUrl%
    يمكنك استخدام اسم المستخدم وكلمة المرور الخاصة بك في أي وقت للوصول إلى مجتمع %appplication_url% .
    للقيام بذلك، فقط قم بزيارة الصفحة التالية: %loginPage%
    لتحرير تفاصيل ملفك الشخصي، اذهب إلى هذه الصفحة: %profilePage%
    أطيب التحيات،
    فريق كاتروبات الخاص بك.
  messageHtml: |
    <p>
    عزيزي %username%.<br>
    <br>
    لقد طلبت إعادة تعيين كلمة المرور الخاصة بك في <a href=%appplication_url%>بوكت كوود</a> لأنك نسيت كلمة المرور الخاصة بك.
    إذا لم تطلب ذلك، يرجى تجاهله. ستنتهي صلاحيتها وتصبح عديمة الفائدة في غضون 24 ساعة.<br>
    <br>
    لإعادة تعيين كلمة المرور الخاصة بك وإنشاء كلمة مرور جديدة، الرجاء النقر فوق <a href=%confirmationUrl%>هنا.</a><br>
    <br>
    يمكنك استخدام اسم المستخدم وكلمة المرور الخاصة بك في أي وقت للوصول إلى المجتمع <a href=%appplication_url%>بوكت كوود</a> .<br>
    للقيام بذلك، فقط قم بزيارة الصفحة التالية: <a href=%loginPage%>صفحة تسجيل الدخول</a><br>
    لتحرير تفاصيل ملفك الشخصي، اذهب إلى هذه الصفحة <a href=%profilePage%></a>.<br>
    <br>
    أطيب التحيات،<br>
    فريق كاتروبات الخاص بك.
    </p>
