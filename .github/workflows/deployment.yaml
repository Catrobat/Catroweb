# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# ** Deployment **
#
#  Test deployments are handled by a python script that run on a schedule: https://github.com/Catrobat/Catroweb-API
#  However, the deployment to production is handled by this workflow.
#
#  - Secrets required!
#
name: Deployment
permissions:
  contents: read

# Run-on every merge of a pull request into the main branch
on:
  push:
    branches:
      - main

# The concurrency: production_environment is important as it prevents concurrent deploys.
concurrency: production_environment

jobs:
  # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
  # Pre-deployment checks:
  #
  #  - Verify database migrations can be applied cleanly (dry-run)
  #
  pre_deploy_checks:
    name: Pre-deployment checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 'Setup PHP and composer packages'
        uses: ./.github/actions/setup-php-composer

      - name: Validate Doctrine migrations (dry-run)
        run: php bin/console doctrine:migrations:migrate --dry-run --no-interaction --allow-no-migration
        env:
          DATABASE_URL: 'sqlite:///:memory:'

  # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
  # Deployment:
  #
  #  - An SSH connection is required (public key must be registered on server!)
  #  - Add all credentials hidden in secrets to the configuration files
  #
  deploy:
    needs: pre_deploy_checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 'Setup PHP and composer packages'
        uses: ./.github/actions/setup-php-composer

      - name: Deploy Share
        uses: deployphp/action@v1
        with:
          private-key: ${{ secrets.DEPLOY_SHARE_SSH_KEY }}
          dep: deploy
        env:
          APP_NAME: Catroweb
          DEPLOY_GIT: https://github.com/Catrobat/Catroweb.git
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_BRANCH: main
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

  # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
  # Post-deployment smoke test:
  #
  #  - Verifies the health endpoint responds correctly after deployment
  #  - On failure, triggers a Deployer rollback to the previous release
  #
  smoke_test:
    name: Post-deployment smoke test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 'Setup PHP and composer packages'
        uses: ./.github/actions/setup-php-composer

      - name: Wait for deployment to stabilize
        run: sleep 10

      - name: Smoke test - health endpoint
        id: health_check
        run: |
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
              "https://${{ secrets.DEPLOY_HOST }}/api/health" \
              --max-time 15 || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed (attempt $i)"
              cat /tmp/health_response.json
              exit 0
            fi

            echo "Attempt $i/$MAX_RETRIES failed with HTTP $HTTP_CODE"
            if [ -f /tmp/health_response.json ]; then
              cat /tmp/health_response.json
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              sleep $RETRY_DELAY
            fi
          done

          echo "::error::Health check failed after $MAX_RETRIES attempts (last HTTP code: $HTTP_CODE)"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.health_check.outcome == 'failure'
        uses: deployphp/action@v1
        with:
          private-key: ${{ secrets.DEPLOY_SHARE_SSH_KEY }}
          dep: rollback
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify rollback via Slack
        if: failure() && steps.health_check.outcome == 'failure'
        uses: deployphp/action@v1
        with:
          private-key: ${{ secrets.DEPLOY_SHARE_SSH_KEY }}
          dep: slack:notify:failure
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
