# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# ** Deployment **
#
#  Test deployments are handled by a python script that run on a schedule: https://github.com/Catrobat/Catroweb-API
#  However, the deployment to production is handled by this workflow.
#
#  - Secrets required!
#
name: Deployment
permissions:
  contents: read

# Run-on every merge of a pull request into the main branch
on:
  push:
    branches:
      - main

# The concurrency group prevents concurrent deploys. cancel-in-progress is false
# to avoid leaving the server in a half-deployed state.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  # Opt in to Node.js 24 for all actions (Node.js 20 is deprecated, deadline June 2nd, 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
  # Deployment:
  #
  #  - An SSH connection is required (public key must be registered on server!)
  #  - Add all credentials hidden in secrets to the configuration files
  #
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 'Setup PHP and composer packages'
        uses: ./.github/actions/setup-php-composer

      - name: Deploy Share
        # Pin to a commit that still streams full dep output in Actions logs.
        # Newer deployphp/action@v1 revisions swallow task-level output and only
        # print "Failed: dep deploy", which blocks root-cause debugging.
        uses: deployphp/action@5d9b48b8ce6a81cfff681cbc330eb7944f102093
        with:
          private-key: ${{ secrets.DEPLOY_SHARE_SSH_KEY }}
          dep: deploy
          verbosity: -vvv
        env:
          APP_NAME: Catroweb
          DEPLOY_GIT: https://github.com/Catrobat/Catroweb.git
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_BRANCH: main
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

  # Post-deployment health check is handled by Deployer's smoke_test task
  # (deploy.php) which runs directly on the server via localhost. The previous
  # GitHub Actions-based smoketest was removed because GH runners cannot
  # reliably reach the production server (HTTP 000 / network timeout), causing
  # false-positive rollbacks on every deployment.
