# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# ** Release preparation **
#
#  This workflow creates a single pull request from a release branch into main.
#
#  The pull request contains:
#     - Bump release version -> .env
#
#  A draft GitHub release is also created for the new version.
#  Merging the PR triggers the deployment workflow automatically.
#
name: Create Release PR

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create_release:
    name: Create Release PR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Calculate new version
        id: version
        run: |
          current=$(grep -oP "(?<=APP_VERSION=')[0-9]+\.[0-9]+\.[0-9]+" .env)
          major=$(echo "$current" | cut -d. -f1)
          minor=$(echo "$current" | cut -d. -f2)
          patch=$(echo "$current" | cut -d. -f3)
          cy=$(date +%y)
          cm=$(date +%-m)
          if [[ "$major" -ne "$cy" || "$minor" -ne "$cm" ]]; then
            patch=-1
          fi
          new="${cy}.${cm}.$((patch + 1))"
          echo "new_version=$new" >> "$GITHUB_OUTPUT"

      - name: Bump version in .env
        run: |
          sed -i -E "s/APP_VERSION='[0-9]+\.[0-9]+\.[0-9]+'/APP_VERSION='${{ steps.version.outputs.new_version }}'/" .env

      - name: Create Release PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: bump version to ${{ steps.version.outputs.new_version }}'
          committer: Catrobot <catrobot@users.noreply.github.com>
          branch: release/v${{ steps.version.outputs.new_version }}
          delete-branch: true
          base: main
          title: 'Release v${{ steps.version.outputs.new_version }}'
          body: |
            ### Release v${{ steps.version.outputs.new_version }}

            - [x] Bump version in `.env`

            Merging this PR triggers the production deployment automatically.

            This pull request is autogenerated using GitHub Actions.
            For more information checkout the action `.github/workflows/create_release_pull_request.yaml`
          labels: automated, new-release
          reviewers: dmetzner

      - name: Create draft GitHub Release
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes=$(git log --pretty=format:"* %s" "$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)"..HEAD)
          gh release create "v${{ steps.version.outputs.new_version }}" \
            --target "release/v${{ steps.version.outputs.new_version }}" \
            --title "v${{ steps.version.outputs.new_version }}" \
            --notes "$notes" \
            --draft
