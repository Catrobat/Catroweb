name: 'Install node and yarn dependencies'
description: 'Install node and yarn dependencies using corepack and caching.'
runs:
  using: 'composite'
  steps:
    - name: 'Download and set up node'
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: 'Enable corepack'
      shell: bash
      run: |
        corepack enable
        corepack prepare yarn@4.12.0 --activate

    - name: 'Restore yarn and node_modules cache'
      uses: actions/cache@v5
      with:
        path: |
          node_modules
          ~/.yarn/berry/cache
        key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-yarn-

    - name: 'Install dependencies'
      shell: bash
      run: yarn install --immutable
