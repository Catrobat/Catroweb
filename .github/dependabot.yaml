#
# **Dependabot** (https://dependabot.com/):
#
#   - automatically updates all dependencies
#   - creates a new PR for every updated dependency (PR comment contains change-logs)
#   - is integrated on GitHub and can be deactivated in the GitHub settings (ask a product-
#
#   - use this file to configure which dependencies (package-ecosystem) should be updated and on what schedule_
#
# Cooldown: delays PRs for freshly published releases as a canary buffer against
# supply chain attacks (compromised packages are often pulled within days of
# publication). Patches roll faster than minors/majors so security fixes still
# land quickly.
#
version: 2
updates:
  - package-ecosystem: 'docker'
    directory: '/docker'
    schedule:
      interval: daily
      time: '04:00'
      timezone: 'Europe/Vienna'
    open-pull-requests-limit: 99
    cooldown:
      default-days: 5
      semver-major-days: 7
      semver-minor-days: 5
      semver-patch-days: 3

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: daily
      time: '04:00'
      timezone: 'Europe/Vienna'
    open-pull-requests-limit: 99
    groups:
      material:
        patterns:
          - '@material/*'
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: 'composer'
    directory: '/'
    schedule:
      interval: daily
      time: '04:00'
      timezone: 'Europe/Vienna'
    open-pull-requests-limit: 99
    groups:
      symfony:
        patterns:
          - 'symfony/*'
      phpstan:
        patterns:
          - 'phpstan/*'
      behat:
        patterns:
          - 'behat/*'
          - 'friends-of-behat/*'
      doctrine:
        patterns:
          - 'doctrine/*'
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: daily
      time: '04:00'
      timezone: 'Europe/Vienna'
    open-pull-requests-limit: 99
    cooldown:
      default-days: 5
      semver-major-days: 7
      semver-minor-days: 5
      semver-patch-days: 3

  - package-ecosystem: 'pip'
    directory: '/docker/nsfw-scanner'
    schedule:
      interval: daily
      time: '04:00'
      timezone: 'Europe/Vienna'
    open-pull-requests-limit: 99
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
